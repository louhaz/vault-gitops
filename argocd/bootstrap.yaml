apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ibm-vault-bootstrap
  namespace: openshift-gitops
spec:
  destination:
    namespace: openshift-gitops
    server: https://kubernetes.default.svc
  project: default
  source:
    path: ./argocd
    targetRevision: HEAD
    repoURL: https://github.com/louhaz/vault-gitops
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
