apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vault
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "30"
spec:
  destination:
    namespace: vault
    server: https://kubernetes.default.svc
  project: default
  source:
    chart: vault
    repoURL: https://helm.releases.hashicorp.com
    targetRevision: 0.32.0
    helm:
      values: |
        global:
          openshift: true
        
        injector:
          enabled: true
          image:
            repository: hashicorp/vault-k8s
            tag: 1.4.1
          agentImage:
            repository: hashicorp/vault
            tag: 1.21.2
          securityContext:
            pod:
              runAsNonRoot: true
              runAsGroup: null
              runAsUser: null
              fsGroup: null
            container:
              allowPrivilegeEscalation: false
          certs:
            secretName: null
        
        server:
          enabled: true
          image:
            repository: hashicorp/vault
            tag: 1.21.2
          resources:
            requests:
              memory: 256Mi
              cpu: 250m
            limits:
              memory: 512Mi
              cpu: 500m
          dataStorage:
            enabled: true
            size: 10Gi
          standalone:
            enabled: true
            config: |
              ui = true
              
              listener "tcp" {
                tls_disable = 1
                address = "[::]:8200"
                cluster_address = "[::]:8201"
              }
              
              storage "file" {
                path = "/vault/data"
              }
          securityContext:
            pod:
              runAsNonRoot: true
              runAsGroup: null
              runAsUser: null
              fsGroup: null
            container:
              allowPrivilegeEscalation: false
        
        ui:
          enabled: true
          serviceType: ClusterIP
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

